<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        h2, h3 { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Iris Flower Classifier</h2>
        <form action="/predict" method="POST">
            <label>Sepal Length (cm):</label>
            <input type="text" name="sepal_length" required>
            
            <label>Sepal Width (cm):</label>
            <input type="text" name="sepal_width" required>
            
            <label>Petal Length (cm):</label>
            <input type="text" name="petal_length" required>
            
            <label>Petal Width (cm):</label>
            <input type="text" name="petal_width" required>
            
            <button type="submit">Predict Species</button>
        </form>
        {% if prediction_text %}
            <h3>{{ prediction_text }}</h3>
        {% endif %}
    </div>
</body>
</html>
